name: Sync upstream

on:
  workflow_dispatch:
  schedule:
    - cron: '23 */6 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mirror repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/router-for-me/CLIProxyAPI.git 2>/dev/null || git remote set-url upstream https://github.com/router-for-me/CLIProxyAPI.git
          git fetch upstream --prune --tags

      - name: Sync branches
        run: |
          default_branch="$(git remote show upstream | sed -n '/HEAD branch/s/.*: //p')"
          if [ -z "$default_branch" ]; then default_branch=main; fi
          echo "default_branch=$default_branch" >> "$GITHUB_ENV"
          for ref in $(git for-each-ref --format='%(refname:short)' refs/remotes/upstream | sed 's#^upstream/##' | grep -v '^HEAD$'); do
            git push origin "refs/remotes/upstream/$ref:refs/heads/$ref" --force
          done

      - name: Sync tags
        run: |
          git fetch upstream --tags --force
          git push origin --tags --force

      - name: Set default branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api -X PATCH repos/${{ github.repository }} -f default_branch="$default_branch"
